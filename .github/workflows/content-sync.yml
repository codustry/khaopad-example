name: Invalidate content cache

on:
  push:
    branches: [main]
    paths: ["content/**"]

jobs:
  invalidate:
    runs-on: ubuntu-latest
    # Only relevant when using GitHub content mode
    if: ${{ vars.CONTENT_MODE == 'github' }}
    steps:
      - name: Purge KV content cache
        run: |
          curl -s -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.KV_NAMESPACE_ID }}/bulk" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json"

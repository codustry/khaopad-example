name: Deploy

# Single deploy on push to main. No env split, no D1 migration step —
# migrations and seeds are applied out-of-band so this workflow only needs
# the org's CLOUDFLARE_API_TOKEN scoped to Workers Scripts (the default).
#
# If you need staging or per-env stacks, see codustry/khaopad upstream's
# multi-env deploy.yml for a template.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Compile Paraglide
        run: npx paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide

      - run: pnpm build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

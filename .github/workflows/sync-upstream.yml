name: Sync from upstream

# Open a PR whenever codustry/khaopad's main branch advances past ours.
# Runs weekly + on-demand. A human reviews and merges each sync PR so
# breaking changes upstream never silently land on staging/production.

on:
  schedule:
    # Every Monday 03:00 UTC (10:00 Bangkok) — well outside business hours.
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use GITHUB_TOKEN's default actor so the commit appears to come
          # from github-actions[bot]. Switch to a PAT + persist-credentials
          # if you need the sync PR to trigger other workflows.

      - name: Add upstream + fetch
        run: |
          git remote add upstream https://github.com/codustry/khaopad.git
          git fetch upstream main --tags

      - name: Check for new upstream commits
        id: diff
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "→ behind upstream by $BEHIND commit(s)"
          if [[ "$BEHIND" == "0" ]]; then
            echo "Already up to date — nothing to do."
          fi

      - name: Create sync branch
        if: steps.diff.outputs.behind != '0'
        id: branch
        run: |
          SHORT_SHA=$(git rev-parse --short upstream/main)
          BRANCH="chore/sync-upstream-${SHORT_SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          # Merge, not rebase — we want the sync PR to show the exact upstream
          # commits as-is so reviewers can see what they're getting.
          git merge --no-edit upstream/main || {
            echo "::error::Merge conflict with upstream/main. Resolve by hand: pull this branch, fix, push."
            exit 1
          }
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Open or update PR
        if: steps.diff.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          SHA: ${{ steps.branch.outputs.sha }}
          BEHIND: ${{ steps.diff.outputs.behind }}
        run: |
          set -euo pipefail
          # If a PR already exists for this exact branch, do nothing —
          # otherwise open it.
          existing=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' || echo "")
          if [[ -n "$existing" ]]; then
            echo "PR #$existing already open for $BRANCH — skipping."
            exit 0
          fi
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: sync from codustry/khaopad@${SHA}" \
            --body "Automated sync from [codustry/khaopad](https://github.com/codustry/khaopad) — **${BEHIND} commit(s)** behind upstream.

## What to do

1. Review the diff — pay attention to \`drizzle/\` migrations, \`wrangler.toml\` env blocks, and any breaking \`ContentProvider\` changes.
2. Merge this PR to deploy the upstream changes to **staging** (M6 pipeline will run).
3. Tag a new release \`vX.Y.Z\` to promote to production once staging QA passes.

If the merge conflicts, pull this branch locally, resolve, and push — this workflow won't force-push over your fix.

_Generated by \`.github/workflows/sync-upstream.yml\`_"

name = "khaopad"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
main = ".svelte-kit/cloudflare/_worker.js"
assets = { directory = ".svelte-kit/cloudflare", binding = "ASSETS" }

# ──────────────────────────────────────
# Routes — uncomment and configure for production
# ──────────────────────────────────────
# routes = [
#   { pattern = "www.example.com/*", zone_name = "example.com" },
#   { pattern = "cms.example.com/*", zone_name = "example.com" },
# ]

# ──────────────────────────────────────
# D1 Database
# ──────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "khaopad-db"
database_id = "LOCAL_DB_ID"           # Replace with actual D1 ID for production
migrations_dir = "drizzle"

# ──────────────────────────────────────
# R2 Media Bucket
# ──────────────────────────────────────
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "khaopad-media"

# ──────────────────────────────────────
# KV Content Cache
# ──────────────────────────────────────
[[kv_namespaces]]
binding = "CONTENT_CACHE"
id = "LOCAL_KV_ID"                    # Replace with actual KV ID for production

# ──────────────────────────────────────
# Environment variables
# ──────────────────────────────────────
[vars]
CONTENT_MODE = "d1"                   # "d1" or "github"
SUPPORTED_LOCALES = "en,th"
DEFAULT_LOCALE = "en"
PUBLIC_SITE_URL = "https://www.example.com"
CMS_SITE_URL = "https://cms.example.com"
BETTER_AUTH_URL = "https://cms.example.com"
# GitHub content mode vars (only needed when CONTENT_MODE = "github")
# GITHUB_OWNER = "your-org"
# GITHUB_REPO = "your-repo"
# GITHUB_BRANCH = "main"

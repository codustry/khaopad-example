name = "khaopad-example"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
main = ".svelte-kit/cloudflare/_worker.js"
assets = { directory = ".svelte-kit/cloudflare", binding = "ASSETS" }

# ──────────────────────────────────────
# Cloudflare resources (Codustry account)
# ──────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "khaopad-example-db"
database_id = "f961aace-5d9f-41bc-ae36-563a60e6c274"
migrations_dir = "drizzle"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "khaopad-example-media"

[[kv_namespaces]]
binding = "CONTENT_CACHE"
id = "eaa2d962e21c44a585a64fcf497e1e5f"

# ──────────────────────────────────────
# Public env vars
# ──────────────────────────────────────
# Single host, two surfaces (since v1.1):
#   /            → public site
#   /cms/*       → admin CMS
[vars]
SUPPORTED_LOCALES = "en,th"
DEFAULT_LOCALE = "en"
PUBLIC_SITE_URL = "https://khaopad-example.codustry.workers.dev"
# CMS_SITE_URL is a deprecated alias used only by the R2 media URL helper.
CMS_SITE_URL = "https://khaopad-example.codustry.workers.dev"
BETTER_AUTH_URL = "https://khaopad-example.codustry.workers.dev"

# BETTER_AUTH_SECRET is set as a worker secret (not in this file). See README.
